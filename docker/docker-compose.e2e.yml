# Ephemeral E2E test stack — no volumes, isolated ports
# Usage: docker compose -f docker/docker-compose.e2e.yml up -d
# Ports: MySQL 3308, Redis 6381, API 3001, Web 3000

services:
  mysql:
    image: mysql:8.0
    container_name: prodigy-mysql-e2e
    environment:
      MYSQL_ROOT_PASSWORD: e2e_secret
      MYSQL_DATABASE: prodigy_glasses_e2e
      MYSQL_USER: prodigy_e2e
      MYSQL_PASSWORD: e2e_secret
    ports:
      - '3308:3306'
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks:
      - e2e-net

  redis:
    image: redis:7-alpine
    container_name: prodigy-redis-e2e
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 2s
      retries: 5
    networks:
      - e2e-net

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: prodigy-api-e2e
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      NODE_ENV: test
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: prodigy_e2e
      DB_PASSWORD: e2e_secret
      DB_DATABASE: prodigy_glasses_e2e
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: e2e-access-secret-key
      JWT_REFRESH_SECRET: e2e-refresh-secret-key
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/api/health']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - e2e-net

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: prodigy-web-e2e
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - e2e-net

networks:
  e2e-net:
    driver: bridge
