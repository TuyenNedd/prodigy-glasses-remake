name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  # Detect which paths changed
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      shared: ${{ steps.filter.outputs.shared }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/shared-types/**'
              - 'package-lock.json'
            web:
              - 'apps/web/**'
              - 'packages/shared-types/**'
              - 'package-lock.json'
            shared:
              - 'packages/shared-types/**'
            e2e:
              - 'packages/e2e/**'
              - 'docker/docker-compose.e2e.yml'
              - 'docker/Dockerfile.api'
              - 'docker/Dockerfile.web'

  # Always run: lint + format (fast, catches issues early)
  quality:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint

  # Build API only when API or shared-types changed
  build-api:
    name: Build API
    needs: [changes, quality]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared-types
        run: npm run build -w @prodigy/shared-types
      - name: Build API
        run: npm run build -w @prodigy/api

  # Build Web only when Web or shared-types changed
  build-web:
    name: Build Web
    needs: [changes, quality]
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build shared-types
        run: npm run build -w @prodigy/shared-types
      - name: Build Web
        run: npm run build -w @prodigy/web

  # Run E2E tests when e2e, api, or web code changed
  e2e:
    name: E2E Tests
    needs: [changes, quality]
    if: needs.changes.outputs.e2e == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('packages/e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Start E2E stack
        run: docker compose -f docker/docker-compose.e2e.yml up -d --wait

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: packages/e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: packages/e2e/test-results/
          retention-days: 7

      - name: Stop E2E stack
        if: always()
        run: docker compose -f docker/docker-compose.e2e.yml down
